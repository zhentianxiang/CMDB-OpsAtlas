services:
  mysql:
    image: mysql:8.0
    container_name: cmdb-mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: cmdb_auth
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db_conf/my.cnf:/etc/mysql/conf.d/my.cnf
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
      #args:
      #  # 构建镜像代理
      #  HTTP_PROXY: http://192.168.10.2:7890
      #  HTTPS_PROXY: http://192.168.10.2:7890
    container_name: cmdb-auth-service
    environment:
      - DB_DSN=root:rootpassword@tcp(mysql:3306)/cmdb_auth?charset=utf8mb4&parseTime=True&loc=Local
      - PORT=8080
      - LOG_DIR=/app/logs
      - AVATAR_DIR=/app/uploads/avatars
    ports:
      - "8081:8080"
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  cluster-service:
